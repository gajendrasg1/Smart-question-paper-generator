<!DOCTYPE html>
<html>

<head>
    <title>Smart Question Paper Generator</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Smart Question Paper Generator</h1>

    <form action="/generate" method="POST">

        <label>Enter Subject Name</label>

        <input type="text"
               name="subject"
               placeholder="Enter Any Subject"
               required>

        <br><br>

        <label>Difficulty Level</label>

        <select name="difficulty">

            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>

        </select>

        <br><br>

        <label>Number of Questions</label>

        <input type="number"
               name="num_questions"
               required>

        <br><br>

        <button type="submit">
            Generate Question Paper
        </button>

    </form>

</div>

</body>
</html>
